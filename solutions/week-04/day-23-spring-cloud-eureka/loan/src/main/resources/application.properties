spring.application.name=loan-service
server.port=8082

# handout has loan default to 8080 then bump to 8081 once it clashes with account -
# running all three services (eureka, account, loan) together here so loan gets its
# own free port straight away instead of colliding then getting reassigned
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
