spring.application.name=api-gateway
server.port=9090

# discovery locator means i dont have to manually declare a route per service, the
# gateway reads whatever is registered in eureka and builds routes on the fly. so
# http://localhost:9090/account-service/accounts/1 just works with zero route config
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.com.cognizant.apigateway=info
