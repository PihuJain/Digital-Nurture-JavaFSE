spring.application.name=eureka-server
server.port=8761

# a eureka server doesnt need to register itself with eureka or pull down a registry
# of other servers, it IS the registry - without turning these off it tries to be its
# own client too and spams the log with connection errors on startup
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

logging.level.com.netflix.eureka=off
logging.level.com.netflix.discovery=off
